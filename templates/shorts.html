{% extends "base.html" %}
{% block title %}ショート - Choco-tube-plus{% endblock %}
{% block body_class %}page-shorts{% endblock %}
{% block head %}<script>window._EDU_PARAMS={{ edu_params_json | safe }};</script>{% endblock %}
{% block content %}
<div class="sf-root" id="sfRoot">

  <!-- Comments panel (hidden by default) -->
  <div class="sf-comments-panel" id="sfCommentsPanel" hidden>
    <div class="sf-cp-header">
      <span class="sf-cp-title">コメント</span>
      <div class="sf-cp-sort">
        <button class="sf-cp-sort-btn active" data-sort="top">人気</button>
        <button class="sf-cp-sort-btn" data-sort="new">新しい順</button>
      </div>
      <button class="sf-cp-close" id="sfCpClose" title="閉じる">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sf-cp-list" id="sfCpList"></div>
    <div class="sf-cp-more" id="sfCpMore" hidden>
      <button class="sf-cp-more-btn" id="sfCpMoreBtn">もっと見る</button>
    </div>
  </div>

  <div class="sf-wrap" id="sfWrap">
    <div class="sf-player-area">

      <div class="sf-player-box" id="sfPlayerBox">
        <div class="sf-skeleton" id="sfSkeleton"></div>
        <iframe class="sf-iframe" id="sfIframe" src="about:blank"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen></iframe>

        <div class="sf-overlay" id="sfOverlay">
          <div class="sf-overlay-channel">
            <a class="sf-ch-link" id="sfChLink" href="#">
              <img class="sf-ch-avatar" id="sfChAvatar" src="" alt="" />
              <span class="sf-ch-name" id="sfChName">読み込み中...</span>
            </a>
          </div>
          <div class="sf-overlay-title" id="sfOverlayTitle"></div>
          <div class="sf-overlay-meta" id="sfOverlayMeta"></div>
        </div>
      </div>

      <div class="sf-side" id="sfSide">
        <button class="sf-nav-btn" id="sfPrevBtn" title="前のショート" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
        </button>

        <button class="sf-action-btn" id="sfCommentBtn" title="コメント">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>コメント</span>
        </button>

        <a class="sf-action-btn" id="sfWatchBtn" href="#" title="通常プレイヤー">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <span>通常</span>
        </a>

        <div class="share-wrap sf-share-wrap" id="sfShareWrap">
          <button class="sf-action-btn" id="sfShareBtn" title="共有">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            <span>共有</span>
          </button>
          <div class="share-panel sf-share-panel" id="sfSharePanel" hidden role="menu">
            <button class="share-panel-item" data-action="copy-id">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              動画IDをコピー
            </button>
            <button class="share-panel-item" data-action="copy-yt">
              <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1C4.5 20.4 12 20.4 12 20.4s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
              YouTube URLをコピー
            </button>
            <button class="share-panel-item" data-action="copy-app">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              このURLをコピー
            </button>
            <button class="share-panel-item" data-action="native">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              共有...
            </button>
          </div>
        </div>
        <a class="sf-action-btn" id="sfYtBtn" href="#" target="_blank" rel="noopener noreferrer" title="YouTubeで開く">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1C4.5 20.4 12 20.4 12 20.4s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
          <span>YT</span>
        </a>

        <div class="sf-param-wrap">
          <label class="sf-param-label" for="sfParamSelect">キー</label>
          <select class="sf-param-select" id="sfParamSelect">
            <option value="0">1</option>
            <option value="1">2</option>
            <option value="2">3</option>
          </select>
        </div>

        <button class="sf-nav-btn" id="sfNextBtn" title="次のショート">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>

    </div>
  </div>
</div>
{% endblock %}
