<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Choco-tube-plus{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/base.css?v=13" />
  <link rel="stylesheet" href="/static/css/global.css?v=13" />
  <link rel="stylesheet" href="/static/css/search.css?v=13" />
  <link rel="stylesheet" href="/static/css/channel.css?v=13" />
  <link rel="stylesheet" href="/static/css/watch.css?v=13" />
  <link rel="stylesheet" href="/static/css/library.css?v=13" />
  <link rel="stylesheet" href="/static/css/settings.css?v=13" />
  <link rel="stylesheet" href="/static/css/shorts.css?v=13" />
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-inv">Choco</span><span class="logo-tube">-tube-plus</span><span class="logo-ver" id="logoVer"></span>
      </a>
      <div class="search-wrapper">
        <form class="search-form" id="searchForm">
          <input type="text" id="searchInput" class="search-input" placeholder="動画を検索..." autocomplete="off" />
          <button type="submit" class="search-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </form>
        <ul id="suggestions" class="suggestions-list" hidden></ul>
      </div>
      <nav class="header-nav">
        <a href="/links" class="header-nav-link{% if active == 'links' %} active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <span>リンク</span>
        </a>
        <a href="/dl" class="header-nav-link{% if active == 'dl' %} active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>ダウンロード</span>
        </a>
        <a href="/library" class="header-nav-link{% if active == 'library' %} active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>ライブラリ</span>
        </a>
        <a href="/chat" class="header-nav-link{% if active == 'chat' %} active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>チャット</span>
        </a>
        <a href="/settings" class="header-nav-link{% if active == 'settings' %} active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>設定</span>
        </a>
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

  <script src="/static/js/utils.js?v=13"></script>
  <script src="/static/js/components.js?v=13"></script>
  <script src="/static/js/library.js?v=13"></script>
  <script src="/static/js/header.js?v=13"></script>
  <script src="/static/js/page-trending.js?v=13"></script>
  <script src="/static/js/page-search.js?v=13"></script>
  <script src="/static/js/page-channel.js?v=13"></script>
  <script src="/static/js/page-playlist.js?v=13"></script>
  <script src="/static/js/page-mix.js?v=13"></script>
  <script src="/static/js/page-hashtag.js?v=13"></script>
  <script src="/static/js/page-watch.js?v=13"></script>
  <script src="/static/js/page-library.js?v=13"></script>
  <script src="/static/js/page-dl.js?v=13"></script>
  <script src="/static/js/page-settings.js?v=13"></script>
  <script src="/static/js/background.js?v=13"></script>
  <script src="/static/js/page-shorts.js?v=13"></script>
  {% block scripts %}{% endblock %}
  <script>
    fetch('/version').then(r=>r.json()).then(d=>{
      const el = document.getElementById('logoVer');
      if(el && d.ver) el.textContent = ' v' + d.ver;
    }).catch(()=>{});
  </script>
</body>
</html>
