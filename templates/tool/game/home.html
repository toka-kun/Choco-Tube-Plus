{% extends "base.html" %}
{% block title %}ゲーム一覧 — Choco-tube-plus{% endblock %}
{% block body_class %}game-home-page{% endblock %}
{% block content %}
<main class="gh-main">
  <div class="gh-container">
    <div class="gh-header">
      <a href="/tool" class="gh-back">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
        ツールに戻る
      </a>
      <h1 class="gh-title">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M6 12h4m-2-2v4M15 11h.01M17 13h.01"/></svg>
        ゲーム一覧
      </h1>
      <p class="gh-desc">ブラウザで遊べるゲームのまとめ。クリックしてすぐプレイ！</p>
    </div>
    <div class="gh-grid">
      {% for game in games %}
      <a href="/game/home/{{ game.slug }}" class="gh-card">
        <div class="gh-thumb-wrap">
          <img
            src="{{ game.thumb }}"
            alt="{{ game.title }}"
            class="gh-thumb"
            loading="lazy"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
          />
          <div class="gh-thumb-fallback" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M6 12h4m-2-2v4M15 11h.01M17 13h.01"/></svg>
          </div>
          <div class="gh-play-overlay">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><circle cx="12" cy="12" r="10" fill="rgba(0,0,0,.55)"/><polygon points="10,8 16,12 10,16" fill="#fff"/></svg>
          </div>
        </div>
        <div class="gh-info">
          <span class="gh-game-title">{{ game.title }}</span>
          <span class="gh-game-desc">{{ game.desc }}</span>
        </div>
      </a>
      {% endfor %}
    </div>
  </div>
</main>
<style>
.gh-main { padding: 24px 16px 56px; }
.gh-container { max-width: 1100px; margin: 0 auto; }
.gh-header { margin-bottom: 28px; }
.gh-back {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: .83rem; color: var(--text-secondary); text-decoration: none;
  margin-bottom: 14px;
  transition: color .15s;
}
.gh-back:hover { color: var(--text-primary); }
.gh-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 1.45rem; font-weight: 700; margin: 0 0 7px;
  color: var(--text-primary);
}
.gh-desc { color: var(--text-secondary); font-size: .9rem; margin: 0; }
.gh-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 18px;
}
.gh-card {
  display: flex; flex-direction: column;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color, rgba(128,128,128,.18));
  border-radius: 12px; overflow: hidden;
  text-decoration: none; color: inherit;
  transition: transform .15s, box-shadow .15s;
  cursor: pointer;
}
.gh-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.15); }
.gh-card:hover .gh-play-overlay { opacity: 1; }
.gh-thumb-wrap {
  position: relative; width: 100%; padding-top: 56.25%;
  background: var(--bg-tertiary, #1a1a1a); overflow: hidden;
}
.gh-thumb {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; transition: transform .2s;
}
.gh-card:hover .gh-thumb { transform: scale(1.04); }
.gh-thumb-fallback {
  position: absolute; inset: 0;
  align-items: center; justify-content: center;
  color: var(--text-secondary);
}
.gh-play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s;
}
.gh-info { padding: 12px 13px 14px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
.gh-game-title { font-weight: 600; font-size: .95rem; color: var(--text-primary); line-height: 1.3; }
.gh-game-desc { font-size: .78rem; color: var(--text-secondary); line-height: 1.5; }
@media (max-width: 480px) {
  .gh-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
}
</style>
{% endblock %}
