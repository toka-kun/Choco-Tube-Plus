{% extends "base.html" %}
{% block title %}ゲーム一覧 — Choco-tube-plus{% endblock %}
{% block body_class %}game-home-page{% endblock %}
{% block content %}
<main class="gh-main">
  <div class="gh-container">
    <div class="gh-header">
      <a href="/tool/game" class="gh-back">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
        ゲームに戻る
      </a>
      <h1 class="gh-title">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M6 12h4m-2-2v4M15 11h.01M17 13h.01"/></svg>
        ゲーム一覧
      </h1>
      <p class="gh-desc">ブラウザで遊べるゲームのまとめ。クリックしてすぐプレイ！</p>
    </div>

    <div class="gh-controls">
      <div class="gh-search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="ghSearch" class="gh-search" type="text" placeholder="ゲームを検索..." autocomplete="off" spellcheck="false">
        <button id="ghSearchClear" class="gh-search-clear" style="display:none" aria-label="クリア">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="gh-sort-btns">
        <button class="gh-sort-btn active" data-sort="added">入荷順 <span class="gh-sort-arrow">↑</span></button>
        <button class="gh-sort-btn" data-sort="name">名前順 <span class="gh-sort-arrow">↑</span></button>
        <button class="gh-sort-btn" data-sort="genre">ジャンル順 <span class="gh-sort-arrow">↑</span></button>
      </div>
    </div>

    <div id="ghCount" class="gh-count"></div>
    <div id="ghGrid" class="gh-grid"></div>
    <div id="ghEmpty" class="gh-empty" style="display:none">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="44" height="44"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>「<strong id="ghEmptyQuery"></strong>」に一致するゲームが見つかりません</span>
    </div>
  </div>
</main>

<script>
(function(){
  const GAMES = {{ games | tojson }};

  const ADDED_ORDER = GAMES.map((g,i) => ({ slug: g.slug, i }))
    .sort((a,b) => {
      const da = GAMES[a.i].added, db = GAMES[b.i].added;
      return da < db ? -1 : da > db ? 1 : a.i - b.i;
    })
    .reduce((m,x,rank) => { m[x.slug] = rank; return m; }, {});

  let currentSort = 'added';
  let currentDesc = false;
  let currentQuery = '';

  const grid   = document.getElementById('ghGrid');
  const empty  = document.getElementById('ghEmpty');
  const count  = document.getElementById('ghCount');
  const search = document.getElementById('ghSearch');
  const clear  = document.getElementById('ghSearchClear');

  function fmtDate(iso) {
    const [,m,d] = iso.split('-');
    return m.replace(/^0/,'') + '/' + d.replace(/^0/,'');
  }

  function makeCard(g) {
    return `<a href="/tool/game/${g.slug}" class="gh-card">
      <div class="gh-thumb-wrap">
        <img src="${g.thumb}" alt="${g.title}" class="gh-thumb" loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="gh-thumb-fallback" style="display:none;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M6 12h4m-2-2v4M15 11h.01M17 13h.01"/></svg>
        </div>
        <div class="gh-play-overlay">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><circle cx="12" cy="12" r="10" fill="rgba(0,0,0,.55)"/><polygon points="10,8 16,12 10,16" fill="#fff"/></svg>
        </div>
        <span class="gh-genre-badge">${g.genre}</span>
      </div>
      <div class="gh-info">
        <span class="gh-game-title">${g.title}</span>
        <span class="gh-game-desc">${g.desc}</span>
        <span class="gh-added">入荷 ${fmtDate(g.added)}</span>
      </div>
    </a>`;
  }

  function makeGenreHeader(genre) {
    return `<div class="gh-genre-header"><span>${genre}</span></div>`;
  }

  function render() {
    const q = currentQuery.toLowerCase();
    let list = GAMES.filter(g =>
      !q || g.title.toLowerCase().includes(q) || g.desc.toLowerCase().includes(q) || g.genre.toLowerCase().includes(q)
    );

    if (list.length === 0) {
      grid.innerHTML = '';
      grid.style.display = 'none';
      empty.style.display = 'flex';
      document.getElementById('ghEmptyQuery').textContent = currentQuery;
      count.textContent = '';
      return;
    }

    grid.style.display = 'grid';
    empty.style.display = 'none';
    count.textContent = list.length + ' 件';

    const d = currentDesc ? -1 : 1;

    if (currentSort === 'added') {
      list = [...list].sort((a,b) => (ADDED_ORDER[a.slug] - ADDED_ORDER[b.slug]) * d);
      grid.innerHTML = list.map(makeCard).join('');
    } else if (currentSort === 'name') {
      list = [...list].sort((a,b) => a.title.localeCompare(b.title, 'ja') * d);
      grid.innerHTML = list.map(makeCard).join('');
    } else {
      list = [...list].sort((a,b) =>
        (a.genre.localeCompare(b.genre, 'ja') || ADDED_ORDER[a.slug] - ADDED_ORDER[b.slug]) * d
      );
      const groups = [];
      let lastGenre = null;
      list.forEach(g => {
        if (g.genre !== lastGenre) { groups.push({ genre: g.genre, items: [] }); lastGenre = g.genre; }
        groups[groups.length-1].items.push(g);
      });
      grid.innerHTML = groups.map(gr =>
        makeGenreHeader(gr.genre) + gr.items.map(makeCard).join('')
      ).join('');
    }
  }

  function updateBtnArrows() {
    document.querySelectorAll('.gh-sort-btn').forEach(btn => {
      const arrow = btn.querySelector('.gh-sort-arrow');
      if (btn.classList.contains('active')) {
        arrow.textContent = currentDesc ? '↓' : '↑';
      } else {
        arrow.textContent = '↑';
      }
    });
  }

  document.querySelectorAll('.gh-sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('active')) {
        currentDesc = !currentDesc;
      } else {
        document.querySelectorAll('.gh-sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        currentDesc = false;
        if (currentSort === 'genre') {
          grid.classList.add('gh-grid--genre');
        } else {
          grid.classList.remove('gh-grid--genre');
        }
      }
      updateBtnArrows();
      render();
    });
  });

  search.addEventListener('input', () => {
    currentQuery = search.value;
    clear.style.display = currentQuery ? 'flex' : 'none';
    render();
  });
  clear.addEventListener('click', () => {
    search.value = '';
    currentQuery = '';
    clear.style.display = 'none';
    search.focus();
    render();
  });

  render();
})();
</script>

<style>
.gh-main { padding: 24px 16px 56px; }
.gh-container { max-width: 1100px; margin: 0 auto; }
.gh-header { margin-bottom: 22px; }
.gh-back {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: .83rem; color: var(--text-secondary); text-decoration: none;
  margin-bottom: 14px; transition: color .15s;
}
.gh-back:hover { color: var(--text-primary); }
.gh-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 1.45rem; font-weight: 700; margin: 0 0 7px;
  color: var(--text-primary);
}
.gh-desc { color: var(--text-secondary); font-size: .9rem; margin: 0; }

/* ── コントロールバー ── */
.gh-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.gh-search-wrap {
  flex: 1;
  min-width: 180px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-secondary, rgba(10,14,26,0.6));
  border: 1px solid var(--card-border, rgba(99,115,150,0.2));
  border-radius: 10px;
  padding: 0 12px;
  height: 40px;
  transition: border-color .15s;
}
.gh-search-wrap:focus-within {
  border-color: var(--accent-color, #d2691e);
}
.gh-search-wrap > svg { flex-shrink: 0; color: var(--text-secondary); }
.gh-search {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: .9rem;
}
.gh-search::placeholder { color: var(--text-secondary); }
.gh-search-clear {
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  color: var(--text-secondary); padding: 2px;
  transition: color .15s;
}
.gh-search-clear:hover { color: var(--text-primary); }
.gh-sort-btns {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.gh-sort-btn {
  padding: 7px 14px;
  font-size: .78rem;
  font-weight: 600;
  border-radius: 8px;
  border: 1px solid var(--card-border, rgba(99,115,150,0.2));
  background: var(--bg-secondary, rgba(10,14,26,0.6));
  color: var(--text-secondary);
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
  white-space: nowrap;
}
.gh-sort-btn:hover { color: var(--text-primary); border-color: rgba(99,115,150,0.4); }
.gh-sort-btn.active {
  background: rgba(210,105,30,0.15);
  border-color: rgba(210,105,30,0.5);
  color: var(--accent-secondary, #f4a460);
}

.gh-count {
  font-size: .75rem;
  color: var(--text-secondary);
  margin-bottom: 12px;
  font-family: 'Share Tech Mono', monospace;
}

/* ── ジャンルヘッダー ── */
.gh-genre-header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 0 2px;
  margin-top: 8px;
}
.gh-genre-header:first-child { margin-top: 0; }
.gh-genre-header span {
  font-size: .72rem;
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: .1em;
  color: var(--accent-secondary, #f4a460);
  white-space: nowrap;
}
.gh-genre-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--card-border, rgba(99,115,150,0.18));
}

/* ── グリッド ── */
.gh-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 18px;
}
.gh-card {
  display: flex; flex-direction: column;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color, rgba(128,128,128,.18));
  border-radius: 12px; overflow: hidden;
  text-decoration: none; color: inherit;
  transition: transform .15s, box-shadow .15s;
  cursor: pointer;
}
.gh-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.2); }
.gh-card:hover .gh-play-overlay { opacity: 1; }
.gh-thumb-wrap {
  position: relative; width: 100%; padding-top: 56.25%;
  background: var(--bg-tertiary, #1a1a1a); overflow: hidden;
}
.gh-thumb {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; transition: transform .2s;
}
.gh-card:hover .gh-thumb { transform: scale(1.04); }
.gh-thumb-fallback {
  position: absolute; inset: 0;
  align-items: center; justify-content: center;
  color: var(--text-secondary);
}
.gh-play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s;
}
.gh-genre-badge {
  position: absolute;
  top: 7px; left: 7px;
  font-size: .62rem;
  font-family: 'Share Tech Mono', monospace;
  padding: 2px 7px;
  border-radius: 999px;
  background: rgba(0,0,0,0.55);
  color: var(--accent-secondary, #f4a460);
  border: 1px solid rgba(210,105,30,0.4);
  backdrop-filter: blur(4px);
  pointer-events: none;
}
.gh-info { padding: 11px 13px 13px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
.gh-game-title { font-weight: 600; font-size: .95rem; color: var(--text-primary); line-height: 1.3; }
.gh-game-desc { font-size: .78rem; color: var(--text-secondary); line-height: 1.5; flex: 1; }
.gh-added {
  font-size: .68rem;
  font-family: 'Share Tech Mono', monospace;
  color: var(--text-secondary);
  opacity: .65;
  margin-top: 3px;
}

/* ── 検索ゼロ ── */
.gh-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 60px 20px;
  color: var(--text-secondary);
  font-size: .9rem;
  text-align: center;
}
.gh-empty svg { opacity: .4; }
.gh-empty strong { color: var(--text-primary); }

@media (max-width: 600px) {
  .gh-controls { gap: 8px; }
  .gh-sort-btn { padding: 6px 10px; font-size: .73rem; }
  .gh-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
}
</style>
{% endblock %}
