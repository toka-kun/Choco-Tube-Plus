<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Steal a Brainrot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #231f20; overflow: hidden; }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }

    #loading-screen .thumb {
      width: 280px;
      height: 158px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid #7c3aed55;
      box-shadow: 0 4px 24px #7c3aed44;
    }

    #loading-screen h2 {
      font-family: 'Segoe UI', sans-serif;
      font-size: 22px;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #loading-screen .progress-wrap {
      width: 300px;
      height: 6px;
      background: #1a1a2e;
      border-radius: 3px;
      overflow: hidden;
    }

    #loading-screen .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      width: 0%;
      transition: width 0.2s;
      border-radius: 3px;
    }

    #loading-screen .pct {
      font-family: monospace;
      color: #888;
      font-size: 13px;
    }

    #loading-screen .cdn-label {
      font-family: monospace;
      color: #444;
      font-size: 11px;
    }

    #unity-container {
      width: 100%;
      height: 100%;
      position: relative;
      display: none;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      background: #231f20;
      display: block;
    }
  </style>
</head>
<body>

<div id="loading-screen">
  <img class="thumb" src="https://freezenova.com/lessons/img/steal-a-brainrot.jpg" alt="Steal a Brainrot" onerror="this.style.display='none'">
  <h2>🤯 Steal a Brainrot</h2>
  <div class="progress-wrap"><div class="progress-fill" id="pf"></div></div>
  <div class="pct" id="pct">0%</div>
  <div class="cdn-label" id="cdn-label">CDNに接続中...</div>
</div>

<div id="unity-container">
  <canvas id="unity-canvas"></canvas>
</div>

<script>
  var CDN_PROVIDERS = [
    "https://cdn.jsdelivr.net/gh/kuru-bana/Games@main",
    "https://raw.githubusercontent.com/kuru-bana/Games/main"
  ];

  function loadWithFallback(subpath, onSuccess, onFail) {
    var providers = CDN_PROVIDERS.slice();
    var idx = 0;
    function tryNext() {
      if (idx >= providers.length) { if (onFail) onFail(); return; }
      var base = providers[idx++];
      document.getElementById('cdn-label').textContent =
        (base.includes('jsdelivr') ? 'jsDelivr' : 'GitHub Raw') + ' から読み込み中...';
      var s = document.createElement('script');
      s.src = base + subpath;
      s.onload = function() { onSuccess(base); };
      s.onerror = tryNext;
      document.body.appendChild(s);
    }
    tryNext();
  }

  var canvas = document.querySelector('#unity-canvas');
  var config = {
    streamingAssetsUrl: 'StreamingAssets',
  };

  HTMLCanvasElement.prototype.requestPointerLock = function() {};

  function isMobileDevice() {
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    return (/android/i.test(ua) && !/mobile/i.test(ua)) ||
      /iPad|Tablet|PlayBook/i.test(ua) ||
      /Mobile|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua) ||
      (isTouch && /Macintosh/i.test(ua));
  }

  if (isMobileDevice()) {
    window.environmentData = {
      language: 'en', domain: 'default_domain', deviceType: 'mobile',
      appID: 'default_app_id', browserLang: navigator.language || 'en'
    };
  } else {
    window.environmentData = 'null';
    window.jsonEnvir = {
      language: 'en', domain: 'default_domain', deviceType: 'desktop',
      appID: 'default_app_id', browserLang: navigator.language || 'en'
    };
  }

  window.cloudSaves = 'noData';
  window.paymentsData = 'none';
  window.playerData = 'noData';

  window.ysdk = {
    environment: {
      i18n: { lang: navigator.language ? navigator.language.slice(0,2) : 'en', tld: 'com' },
      app: { id: '' },
      browser: { lang: navigator.language || 'en' },
      payload: ''
    },
    features: {
      LoadingAPI: { ready: function() {} }
    },
    getLeaderboards: function() { return Promise.resolve(null); },
    getPlayer: function() { return Promise.resolve({ getMode: function(){ return ''; }, getData: function(){ return Promise.resolve({}); }, setData: function(){ return Promise.resolve(); }, getName: function(){ return ''; }, getPhoto: function(){ return ''; } }); },
    auth: { openAuthDialog: function() { return Promise.resolve(); } },
    adv: { showFullscreenAdv: function(o){ if(o&&o.callbacks&&o.callbacks.onClose) o.callbacks.onClose(false); }, showRewardedVideo: function(o){ if(o&&o.callbacks&&o.callbacks.onClose) o.callbacks.onClose(); } },
    isAvailableMethod: function() { return false; }
  };

  function progressHandler(progress) {
    var pct = Math.round(progress * 100);
    document.getElementById('pf').style.width = pct + '%';
    document.getElementById('pct').textContent = pct + '%';
  }

  loadWithFallback('/steal-a-brainrot/dev.js',
    function(activeBase) {
      var B = activeBase + '/steal-a-brainrot';
      config.dataUrl      = B + '/devsabd.js';
      config.frameworkUrl = B + '/devsabf.js';
      config.codeUrl      = B + '/devsabw.js';
      var apiScript = document.createElement('script');
      apiScript.src = B + '/api.js';
      apiScript.onerror = function() {};
      document.body.appendChild(apiScript);
      createUnityInstance(canvas, config, progressHandler).then(function(instance) {
        window.myGameInstance = instance;
        setTimeout(function() {
          document.getElementById('loading-screen').style.display = 'none';
          document.getElementById('unity-container').style.display = 'block';
        }, 1000);
      }).catch(function(err) { console.error(err); });
    },
    function() {
      document.getElementById('loading-screen').innerHTML =
        '<h2 style="color:#ef4444;font-family:sans-serif;">CDNからの読み込みに失敗しました</h2>' +
        '<p style="color:#888;font-family:sans-serif;font-size:13px;">jsDelivr・GitHub Raw どちらも応答なし</p>';
    }
  );

  var leaderboard = null;

  function FullAdShow() {
    if (window.myGameInstance) window.myGameInstance.SendMessage('YandexGame', 'CloseFullAd', 'false');
  }
  function RewardedShow(id) {
    if (window.myGameInstance) {
      window.myGameInstance.SendMessage('YandexGame', 'RewardVideo', id);
      window.myGameInstance.SendMessage('YandexGame', 'CloseVideo');
    }
  }
  function OpenAuthDialog() {
    if (window.myGameInstance) window.myGameInstance.SendMessage('YandexGame', 'GetDataInvoke');
  }
  function SaveCloud(jsonData, flush) {}
  function InitGame(photoSize, scopes, gameReadyApi) {}
  function GameReadyAPI() {}
  function GetLeaderboardScores() {}
  function ConsumePurchases() {}
  function GetPayments() { return Promise.resolve('none'); }
  function InitLeaderboard() {
    try {
      window.ysdk.getLeaderboards().then(function(_lb) {
        leaderboard = _lb;
        if (window.myGameInstance) window.myGameInstance.SendMessage('YandexGame', 'InitializedLB');
      }).catch(function() {});
    } catch(e) {}
  }
  function SetLeaderboardScore(leaderboardName, score) {}
  function GetLeaderboardEntries(leaderboardName) {}
  function AuthPlayer() {
    if (window.myGameInstance) window.myGameInstance.SendMessage('YandexGame', 'GetDataInvoke');
  }
  function ReviewShow() {}
  function GetDataCloud() {
    if (window.myGameInstance) window.myGameInstance.SendMessage('YandexGame', 'GetDataInvoke');
  }
</script>
</body>
</html>
