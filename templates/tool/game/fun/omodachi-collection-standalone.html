<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomodachi Collection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #001a3a; overflow: hidden; }

    #loading-screen {
      position: fixed; inset: 0; background: #001a3a;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 18px; z-index: 100;
    }
    #loading-screen .thumb {
      width: 200px; height: 200px; object-fit: cover; border-radius: 12px;
      border: 2px solid #0064ff44;
      box-shadow: 0 0 32px #0064ff44, 0 4px 24px #00000099;
    }
    #loading-screen h2 {
      font-family: sans-serif; font-size: 22px; font-weight: bold;
      color: #0064ff; text-shadow: 0 0 12px #0064ff66;
    }
    #loading-screen .progress-wrap {
      width: 280px; height: 6px; background: #0a1a2a; border-radius: 3px; overflow: hidden;
      border: 1px solid #0064ff33;
    }
    #loading-screen .progress-fill {
      height: 100%; background: linear-gradient(90deg, #0040cc, #0064ff);
      width: 0%; transition: width 0.3s; border-radius: 3px;
    }
    #loading-screen .cdn-label {
      font-family: monospace; color: #334; font-size: 10px; letter-spacing: 1px;
    }

    #game {
      width: 100%; height: 100%;
      display: none; position: fixed; inset: 0;
    }
  </style>
</head>
<body>

<div id="loading-screen">
  <img class="thumb"
    src="https://freezenova.com/lessons/img3/tomodachi-collection.webp"
    alt="Tomodachi Collection"
    onerror="this.style.display='none'">
  <h2>Tomodachi Collection</h2>
  <div class="progress-wrap"><div class="progress-fill" id="pf"></div></div>
  <div class="cdn-label" id="cdn-label">接続中...</div>
</div>

<div id="game"></div>

<script>
(function () {
  var CACHE_VER   = "1";
  var GHRAW_BASE  = "https://raw.githubusercontent.com/kuru-bana/Games/main/tomodachi-collection";
  var EJS_CDN     = "https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data";

  function v(url) { return url + "?v=" + CACHE_VER; }

  var pfEl      = document.getElementById('pf');
  var cdnLabel  = document.getElementById('cdn-label');
  var loadingEl = document.getElementById('loading-screen');
  var gameDiv   = document.getElementById('game');

  window.EJS_player        = "#game";
  window.EJS_core          = "nds";
  window.EJS_gameName      = "Tomodachi Collection";
  window.EJS_color         = "#0064ff";
  window.EJS_startOnLoaded = true;
  window.EJS_gameUrl       = v(GHRAW_BASE + "/rom.nds");
  window.EJS_pathtodata    = EJS_CDN + "/";

  window.EJS_onGameStart = function () {
    loadingEl.style.display = 'none';
    gameDiv.style.display   = 'block';
  };

  cdnLabel.textContent = 'EmulatorJS を読み込み中...';

  var s = document.createElement('script');
  s.src = EJS_CDN + "/loader.js";
  s.onerror = function () {
    cdnLabel.innerHTML = '<span style="color:#f55">読み込み失敗 — CDN に接続できません</span>';
  };
  document.body.appendChild(s);
})();
</script>
</body>
</html>
