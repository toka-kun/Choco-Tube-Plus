<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Mario 64</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0f0505; overflow: hidden; }
    #loading-screen {
      position: fixed; inset: 0; background: #0f0505;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; z-index: 100;
    }
    #loading-screen .thumb {
      width: 280px; height: 158px; object-fit: cover; border-radius: 12px;
      border: 2px solid #ef444455; box-shadow: 0 4px 24px #ef444444;
    }
    #loading-screen h2 {
      font-family: 'Segoe UI', sans-serif; font-size: 22px;
      background: linear-gradient(90deg, #f87171, #fbbf24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    #loading-screen .progress-wrap { width: 300px; height: 6px; background: #2a0808; border-radius: 3px; overflow: hidden; }
    #loading-screen .progress-fill { height: 100%; background: linear-gradient(90deg, #ef4444, #d97706); border-radius: 3px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { width: 20%; } 50% { width: 80%; } }
    #loading-screen .pct { font-family: monospace; color: #8a3030; font-size: 13px; }
    #loading-screen .cdn-label { font-family: monospace; color: #4a1010; font-size: 11px; }
    #game-wrap { width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; }
    #canvas { width: 100vw; height: 100vh; image-rendering: pixelated; cursor: default; }
  </style>
</head>
<body>
<div id="loading-screen">
  <img class="thumb" src="https://freezenova.com/lessons/supermario64.webp" alt="Super Mario 64" onerror="this.style.display='none'">
  <h2>⭐ Super Mario 64</h2>
  <div class="progress-wrap"><div class="progress-fill"></div></div>
  <div class="pct" id="pct">ゲームを読み込み中...</div>
  <div class="cdn-label" id="cdn-label">CDNに接続中...</div>
</div>
<div id="game-wrap">
  <canvas class="emscripten" id="canvas" width="1920" height="1080" style="cursor:default;"></canvas>
</div>
<script>
var CDN_PROVIDERS = [
  "https://cdn.jsdelivr.net/gh/kuru-bana/Games@main",
  "https://raw.githubusercontent.com/kuru-bana/Games/main"
];
var idx = 0;

function showError() {
  document.getElementById('loading-screen').innerHTML =
    '<h2 style="color:#ef4444;font-family:sans-serif;">⚠️ 読み込みに失敗しました</h2>' +
    '<p style="color:#888;font-family:sans-serif;font-size:13px;">jsDelivr・GitHub Raw どちらも応答なし</p>';
}

function tryLoad() {
  if (idx >= CDN_PROVIDERS.length) { showError(); return; }
  var base = CDN_PROVIDERS[idx++];
  var prefix = base + '/super-mario-64/game/';
  document.getElementById('cdn-label').textContent =
    (base.includes('jsdelivr') ? 'jsDelivr' : 'GitHub Raw') + ' から読み込み中...';

  window.Module = {
    canvas: document.getElementById('canvas'),
    locateFile: function(path) { return prefix + path; },
    preRun: [], postRun: [],
    print: function(t) { console.log(t); },
    printErr: function(t) { console.error(t); },
    onAbort: function() { showError(); },
    onRuntimeInitialized: function() {
      setTimeout(function() {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('game-wrap').style.display = 'flex';
      }, 1000);
    }
  };

  var s = document.createElement('script');
  s.src = prefix + 'sm64.js';
  s.onerror = function() { tryLoad(); };
  document.body.appendChild(s);
}

tryLoad();
</script>
</body>
</html>
