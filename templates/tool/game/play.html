{% extends "base.html" %}
{% block title %}{{ game.title }} — ゲーム{% endblock %}
{% block body_class %}game-play-page{% endblock %}
{% block content %}
<div class="gp-wrap">
  <nav class="gp-navbar">
    <a href="/tool/game" class="gp-back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
      ゲーム一覧
    </a>
    <div class="gp-nav-center">
      <img
        src="{{ game.thumb }}"
        alt="{{ game.title }}"
        class="gp-nav-thumb"
        onerror="this.style.display='none'"
      />
      <span class="gp-nav-title">{{ game.title }}</span>
    </div>
    <button class="gp-fullscreen-btn" title="フルスクリーン" onclick="toggleFullscreen()">
      <svg id="fs-expand" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      <svg id="fs-shrink" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="display:none"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
    </button>
  </nav>
  <div class="gp-frame-wrap" id="frame-wrap">
    <iframe
      id="game-frame"
      src="/tool/game/raw/{{ game.slug }}"
      allowfullscreen
      allow="autoplay; fullscreen; gamepad"
      scrolling="no"
    ></iframe>
  </div>
</div>
<style>
html, body { height: 100%; overflow: hidden; }
.gp-wrap { display: flex; flex-direction: column; height: 100vh; background: #000; }

.gp-navbar {
  display: flex; align-items: center; justify-content: space-between;
  height: 46px; min-height: 46px; padding: 0 14px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2));
  z-index: 10; flex-shrink: 0;
}

.gp-back {
  display: flex; align-items: center; gap: 5px;
  font-size: .83rem; color: var(--text-secondary); text-decoration: none;
  padding: 5px 10px 5px 6px; border-radius: 6px;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.gp-back:hover { background: var(--bg-tertiary, rgba(128,128,128,.12)); color: var(--text-primary); }

.gp-nav-center {
  display: flex; align-items: center; gap: 8px;
  position: absolute; left: 50%; transform: translateX(-50%);
  pointer-events: none;
}
.gp-nav-thumb {
  width: 26px; height: 26px; border-radius: 5px; object-fit: cover;
}
.gp-nav-title {
  font-weight: 600; font-size: .93rem; color: var(--text-primary);
  white-space: nowrap; max-width: 240px; overflow: hidden; text-overflow: ellipsis;
}

.gp-fullscreen-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-secondary); padding: 6px 8px; border-radius: 6px;
  display: flex; align-items: center; transition: background .15s, color .15s;
}
.gp-fullscreen-btn:hover { background: var(--bg-tertiary, rgba(128,128,128,.12)); color: var(--text-primary); }

.gp-frame-wrap { flex: 1; overflow: hidden; }
#game-frame {
  width: 100%; height: 100%; border: none; display: block;
}

.gp-frame-wrap.fullscreen {
  position: fixed; inset: 0; z-index: 9999;
}
</style>
<script>
function toggleFullscreen() {
  const wrap = document.getElementById('frame-wrap');
  const expand = document.getElementById('fs-expand');
  const shrink = document.getElementById('fs-shrink');
  const isFs = wrap.classList.toggle('fullscreen');
  expand.style.display = isFs ? 'none' : '';
  shrink.style.display = isFs ? '' : 'none';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const wrap = document.getElementById('frame-wrap');
    if (wrap.classList.contains('fullscreen')) toggleFullscreen();
  }
});
</script>
{% endblock %}
